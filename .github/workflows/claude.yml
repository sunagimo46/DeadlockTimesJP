name: Claude 記事生成

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          additional_instructions: |
            ## GitHub Actions 環境における制約

            この環境では外部URL（YouTube、Deadlock Wiki、Reddit など）への直接アクセスは
            利用できません。WebFetch や WebSearch ツールは使用しないでください。

            ## 記事作成の手順

            1. まず Issue の本文とコメントをすべて確認する
            2. 「リサーチ結果」コメントがある場合はその内容を参考情報として使用する
            3. リサーチ結果がない場合は、以下のようにユーザーに案内する：
               - `research-request` ラベルで新しい Issue を作成してリサーチを先に実行するよう伝える
               - または Issue コメントに参考URLや情報を直接貼り付けてもらうよう伝える
            4. CLAUDE.md のルールに従って日本語で記事を作成する
